<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quetzalito Player</title>
<style>
  :root{
    --bg:#0a1612;
    --panel:#0f231d;
    --teal:#1fd1a3;
    --blue:#2b9bd6;
    --text:#e8f5ef;
    --muted:#7fa896;
    --danger:#ff5c5c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Barlow Condensed', Arial, sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 16px;
  }
  .player-wrap{
    width:100%;
    max-width:960px;
  }
  .player-header{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
  }
  .player-header .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--teal);
    box-shadow:0 0 8px var(--teal);
  }
  .player-header h1{
    font-family:'Bebas Neue', Impact, sans-serif;
    font-size:22px;
    letter-spacing:1px;
    margin:0;
    color:var(--text);
  }
  .player-header span{
    color:var(--muted);
    font-size:13px;
  }
  .video-frame{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border-radius:10px;
    overflow:hidden;
    border:1px solid rgba(31,209,163,0.15);
    box-shadow:0 8px 30px rgba(0,0,0,0.5);
  }
  video{
    width:100%;
    height:100%;
    display:block;
    background:#000;
  }
  .overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:rgba(10,22,18,0.85);
    transition:opacity .25s ease;
  }
  .overlay.hidden{
    opacity:0;
    pointer-events:none;
  }
  .spinner{
    width:38px;height:38px;
    border:3px solid rgba(31,209,163,0.25);
    border-top-color:var(--teal);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .overlay p{
    margin:0;
    font-size:14px;
    color:var(--muted);
  }
  .overlay.error p{
    color:var(--danger);
    max-width:80%;
    text-align:center;
  }
  .retry-btn{
    background:var(--teal);
    color:#06140f;
    border:none;
    padding:8px 18px;
    border-radius:6px;
    font-family:'Barlow Condensed', sans-serif;
    font-weight:600;
    letter-spacing:0.5px;
    cursor:pointer;
  }
  .retry-btn:hover{
    background:var(--blue);
  }
  .meta-row{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
  }
  .meta-row b{ color:var(--teal); }
</style>
</head>
<body>

<div class="player-wrap">
  <div class="player-header">
    <div class="dot"></div>
    <h1>QUETZALITO PLAYER</h1>
    <span id="statusText">conectando…</span>
  </div>

  <div class="video-frame">
    <video id="video" controls playsinline></video>

    <div class="overlay" id="overlay">
      <div class="spinner"></div>
      <p>Cargando transmisión…</p>
    </div>
  </div>

  <div class="meta-row">
    <span>Fuente: <b id="sourceLabel">—</b></span>
    <span id="latencyLabel"></span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.13/hls.min.js"></script>
<script>
  // -----------------------------------------------------------------
  // CONFIGURA AQUÍ
  // Pon solo streams (.m3u8) que tengas derecho a transmitir:
  // contenido propio, canales con licencia, o feeds públicos/legales.
  // -----------------------------------------------------------------
  const STREAM_URL = "http://nocable.cc:8080/live/wRQ9Ca/970072/320377.m3u8";
  const SOURCE_NAME = "CDMX Gobierno - Señal en vivo";

  const video = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const statusText = document.getElementById('statusText');
  const sourceLabel = document.getElementById('sourceLabel');

  sourceLabel.textContent = SOURCE_NAME;

  function showOverlay(message, isError){
    overlay.classList.remove('hidden');
    overlay.classList.toggle('error', !!isError);
    overlay.innerHTML = isError
      ? `<p>${message}</p><button class="retry-btn" id="retryBtn">Reintentar</button>`
      : `<div class="spinner"></div><p>${message}</p>`;
    if(isError){
      document.getElementById('retryBtn').onclick = initPlayer;
    }
  }

  function hideOverlay(){
    overlay.classList.add('hidden');
  }

  function initPlayer(){
    statusText.textContent = "conectando…";
    showOverlay("Cargando transmisión…", false);

    if (Hls.isSupported()) {
      const hls = new Hls({
        lowLatencyMode: true,
        backBufferLength: 90
      });

      hls.loadSource(STREAM_URL);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        statusText.textContent = "en vivo";
        hideOverlay();
        video.play().catch(() => {
          // autoplay bloqueado por el navegador; el usuario debe darle play
        });
      });

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              showOverlay("Error de red. Verifica el enlace o tu conexión.", true);
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              hls.recoverMediaError();
              break;
            default:
              showOverlay("No se pudo cargar la transmisión.", true);
              hls.destroy();
              break;
          }
          statusText.textContent = "error";
        }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari / iOS soporta HLS nativo
      video.src = STREAM_URL;
      video.addEventListener('loadedmetadata', () => {
        statusText.textContent = "en vivo";
        hideOverlay();
        video.play().catch(()=>{});
      });
      video.addEventListener('error', () => {
        statusText.textContent = "error";
        showOverlay("No se pudo cargar la transmisión.", true);
      });
    } else {
      statusText.textContent = "no soportado";
      showOverlay("Tu navegador no soporta reproducción HLS.", true);
    }
  }

  initPlayer();
</script>

</body>
</html>
